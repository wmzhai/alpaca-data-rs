name: github-pages

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo test
        run: cargo test

      - name: cargo check --examples
        run: cargo check --examples

      - name: cargo test --doc
        run: cargo test --doc

      - name: cargo package
        run: cargo package

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci --prefix website

      - name: Build rustdoc
        run: cargo doc --no-deps

      - name: Copy rustdoc bundle into site static assets
        run: |
          rm -rf website/static/api
          mkdir -p website/static/api
          cp -R target/doc/. website/static/api/

      - name: Build Docusaurus site
        run: npm run build --prefix website

      - name: Archive Pages artifact
        run: |
          tar \
            --dereference \
            --hard-dereference \
            --directory website/build \
            -cvf "$RUNNER_TEMP/github-pages-artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages-artifact.tar
          retention-days: 1
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve crate metadata
        id: crate
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import subprocess

          meta = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--no-deps", "--format-version", "1"],
                  text=True,
              )
          )
          pkg = {item["id"]: item for item in meta["packages"]}[
              meta["workspace_default_members"][0]
          ]

          print(f"name={pkg['name']}")
          print(f"version={pkg['version']}")
          PY

      - name: Check whether the release is already published
        id: published
        env:
          CRATE_NAME: ${{ steps.crate.outputs.name }}
          CRATE_VERSION: ${{ steps.crate.outputs.version }}
          CRATES_IO_USER_AGENT: alpaca-data-release-check (+https://github.com/${{ github.repository }})
        run: |
          # crates.io may reject anonymous shared-runner traffic that does not identify itself.
          http_status="$(curl -sS \
            -A "$CRATES_IO_USER_AGENT" \
            -H 'Accept: application/json' \
            -o /tmp/crates-io-version.json \
            -w '%{http_code}' \
            "https://crates.io/api/v1/crates/${CRATE_NAME}/${CRATE_VERSION}")"

          case "$http_status" in
            200)
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "${CRATE_NAME} ${CRATE_VERSION} already exists on crates.io; skipping publish."
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "unexpected crates.io status: $http_status" >&2
              cat /tmp/crates-io-version.json >&2 || true
              exit 1
              ;;
          esac

      - name: Authenticate with crates.io
        if: steps.published.outputs.exists != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish --locked
        if: steps.published.outputs.exists != 'true'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    needs:
      - publish
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract release notes from CHANGELOG.md
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          changelog = Path("CHANGELOG.md")
          lines = changelog.read_text(encoding="utf-8").splitlines()
          heading = f"## {tag}"

          start = None
          for index, line in enumerate(lines):
              if line.strip() == heading:
                  start = index
                  break

          if start is None:
              raise SystemExit(f"missing changelog section for {tag}")

          end = len(lines)
          for index in range(start + 1, len(lines)):
              if lines[index].startswith("## "):
                  end = index
                  break

          section = "\n".join(lines[start + 1 : end]).strip()
          if not section:
              raise SystemExit(f"empty changelog section for {tag}")

          Path("release-notes.md").write_text(section + "\n", encoding="utf-8")
          PY

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
