name: github-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci --prefix website

      - name: Build rustdoc
        run: cargo doc --no-deps

      - name: Copy rustdoc bundle into site static assets
        run: |
          rm -rf website/static/api
          mkdir -p website/static/api
          cp -R target/doc/. website/static/api/

      - name: Build Docusaurus site
        run: npm run build --prefix website

      - name: Package Pages artifact
        run: |
          COPYFILE_DISABLE=1 tar --create --directory website/build --file - . | gzip --no-name > github-pages.tar.gz

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: github-pages.tar.gz
          if-no-files-found: error
          compression-level: 0

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
